<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title></head>
<body style="font-family:Arial;max-width:360px;margin:70px auto;">
  <h2>Elite Insurance Login</h2>
  <form method="post">
    <label>Username<input name="username" required style="width:100%;margin:6px 0;"></label>
    <label>Password<input type="password" name="password" required style="width:100%;margin:6px 0;"></label>
    <button type="submit">Login</button>
  </form>
  <p>Default: admin / admin123</p>
</body></html>
